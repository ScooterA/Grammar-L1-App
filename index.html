<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Practice</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');
  :root {
    --chalk: #f5f0e8;
    --board: #2d4a3e;
    --board-dark: #1e332a;
    --yellow: #f7c948;
    --coral: #e8614a;
    --mint: #5bc8a8;
    --lavender: #9b87d4;
    --sky: #5ab4d4;
    --orange: #fb923c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: var(--board-dark);
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 20px 12px 60px;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 30px, rgba(255,255,255,0.015) 30px, rgba(255,255,255,0.015) 31px),
      repeating-linear-gradient(90deg, transparent, transparent 30px, rgba(255,255,255,0.015) 30px, rgba(255,255,255,0.015) 31px);
  }

  /* PASSWORD */
  #pw-screen {
    position: fixed; inset: 0; z-index: 999;
    background: var(--board-dark);
    background-image: repeating-linear-gradient(0deg, transparent, transparent 30px, rgba(255,255,255,0.015) 30px, rgba(255,255,255,0.015) 31px), repeating-linear-gradient(90deg, transparent, transparent 30px, rgba(255,255,255,0.015) 30px, rgba(255,255,255,0.015) 31px);
    display: flex; align-items: center; justify-content: center;
  }
  .pw-box {
    background: var(--board); border-radius: 22px; padding: 40px 36px 36px;
    width: 100%; max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.08);
    text-align: center; position: relative; overflow: hidden;
  }
  .pw-box::before { content:''; position:absolute; top:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--yellow),var(--mint),var(--lavender)); }
  .pw-icon { font-size:3.2rem; margin-bottom:10px; }
  .pw-title { font-family:'Fredoka One',cursive; font-size:1.9rem; color:var(--yellow); letter-spacing:2px; margin-bottom:6px; text-shadow:2px 2px 0 rgba(0,0,0,0.3); }
  .pw-sub { color:rgba(245,240,232,0.5); font-size:0.85rem; margin-bottom:28px; }
  .pw-label { font-size:0.75rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:rgba(245,240,232,0.5); margin-bottom:10px; }
  .pw-input { width:100%; padding:14px 18px; background:rgba(0,0,0,0.3); border:2px solid rgba(255,255,255,0.12); border-radius:12px; color:var(--chalk); font-family:'Fredoka One',cursive; font-size:1.3rem; letter-spacing:4px; text-align:center; outline:none; transition:border-color 0.2s; margin-bottom:16px; }
  .pw-input:focus { border-color:var(--yellow); }
  .pw-input.shake { animation:shake 0.4s ease; border-color:var(--coral) !important; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
  .pw-btn { width:100%; padding:14px; background:var(--yellow); color:#2d2200; border:none; border-radius:12px; font-family:'Fredoka One',cursive; font-size:1.1rem; letter-spacing:1px; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 15px rgba(247,201,72,0.4); }
  .pw-btn:hover { transform:translateY(-2px); }
  .pw-error { margin-top:14px; font-size:0.82rem; font-weight:700; color:var(--coral); min-height:20px; }

  /* APP */
  #app { display:none; width:100%; flex-direction:column; align-items:center; }
  .screen { display:none; width:100%; flex-direction:column; align-items:center; }
  .screen.active { display:flex; }

  /* SHARED */
  h1 { font-family:'Fredoka One',cursive; font-size:clamp(1.8rem,6vw,3rem); color:var(--yellow); text-align:center; letter-spacing:2px; margin-bottom:4px; text-shadow:3px 3px 0 rgba(0,0,0,0.3); }
  .subtitle { color:rgba(245,240,232,0.55); font-size:0.85rem; margin-bottom:16px; text-align:center; letter-spacing:1px; }
  .back-btn { align-self:flex-start; background:none; border:2px solid rgba(255,255,255,0.15); border-radius:10px; color:rgba(245,240,232,0.65); font-family:'Nunito',sans-serif; font-weight:700; font-size:0.85rem; padding:7px 14px; cursor:pointer; margin-bottom:16px; transition:all 0.2s; }
  .back-btn:hover { border-color:var(--yellow); color:var(--yellow); }
  .card { background:var(--board); border-radius:18px; padding:20px; width:100%; max-width:640px; box-shadow:0 12px 40px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.08); position:relative; overflow:hidden; margin-bottom:12px; }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--yellow),var(--mint),var(--lavender)); }

  /* HOME */
  #home-screen { max-width:720px; }
  .grade-badge { font-family:'Fredoka One',cursive; background:var(--yellow); color:#2d2200; font-size:0.9rem; padding:4px 14px; border-radius:20px; margin-bottom:12px; letter-spacing:1px; }
  .units-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:10px; width:100%; max-width:640px; margin-bottom:14px; }
  .unit-card { background:var(--board); border-radius:14px; padding:16px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; border:2px solid rgba(255,255,255,0.08); }
  .unit-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:var(--uc); }
  .unit-card:hover { transform:translateY(-2px); border-color:var(--uc); }
  .unit-num { font-size:0.65rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:4px; color:var(--uc); }
  .unit-title { font-family:'Fredoka One',cursive; font-size:1rem; color:var(--chalk); letter-spacing:0.5px; margin-bottom:3px; }
  .unit-sub { font-size:0.7rem; color:rgba(245,240,232,0.45); }
  .overall-quiz-btn { width:100%; max-width:640px; padding:14px; border-radius:14px; background:linear-gradient(135deg,var(--yellow),#ff9500); color:#2d2200; border:none; font-family:'Fredoka One',cursive; font-size:1.1rem; letter-spacing:1px; cursor:pointer; transition:all 0.2s; box-shadow:0 4px 15px rgba(247,201,72,0.35); }
  .overall-quiz-btn:hover { transform:translateY(-2px); }

  /* UNIT SCREEN */
  #unit-screen { max-width:640px; }
  .unit-header { text-align:center; margin-bottom:16px; width:100%; }
  .unit-header h2 { font-family:'Fredoka One',cursive; font-size:1.6rem; color:var(--yellow); letter-spacing:1px; }
  .unit-header p { color:rgba(245,240,232,0.5); font-size:0.82rem; margin-top:3px; }
  .weeks-list { width:100%; display:flex; flex-direction:column; gap:8px; margin-bottom:12px; }
  .week-btn { background:var(--board); border:2px solid rgba(255,255,255,0.1); border-radius:12px; padding:14px 16px; cursor:pointer; display:flex; align-items:center; gap:12px; transition:all 0.2s; }
  .week-btn:hover { border-color:var(--wc, var(--mint)); background:rgba(255,255,255,0.04); }
  .week-num-badge { font-family:'Fredoka One',cursive; font-size:0.8rem; background:var(--wc, var(--mint)); color:#1e332a; padding:3px 9px; border-radius:20px; flex-shrink:0; }
  .week-topic { font-family:'Fredoka One',cursive; font-size:1rem; color:var(--chalk); letter-spacing:0.5px; }
  .unit-quiz-btn { width:100%; padding:13px; border-radius:12px; border:none; font-family:'Fredoka One',cursive; font-size:1rem; letter-spacing:1px; cursor:pointer; transition:all 0.2s; }
  .unit-quiz-btn:hover { opacity:0.88; transform:translateY(-1px); }

  /* PRACTICE SCREEN */
  #practice-screen { max-width:640px; }
  .practice-header { width:100%; text-align:center; margin-bottom:14px; }
  .practice-header h2 { font-family:'Fredoka One',cursive; font-size:1.4rem; color:var(--yellow); }
  .practice-header p { color:rgba(245,240,232,0.5); font-size:0.78rem; margin-top:2px; }
  .explain-card { background:rgba(0,0,0,0.25); border-radius:12px; padding:14px 16px; margin-bottom:14px; width:100%; max-width:640px; font-size:0.88rem; color:rgba(245,240,232,0.75); line-height:1.6; border-left:3px solid var(--pc, var(--mint)); }
  .explain-card strong { color:var(--chalk); }
  .progress-bar { width:100%; max-width:640px; height:5px; background:rgba(0,0,0,0.3); border-radius:3px; overflow:hidden; margin-bottom:14px; }
  .progress-fill { height:100%; border-radius:3px; transition:width 0.4s; }
  .q-counter { font-size:0.7rem; color:rgba(245,240,232,0.45); font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; align-self:flex-start; }
  .question-card { background:var(--board); border-radius:14px; padding:18px 16px; width:100%; max-width:640px; margin-bottom:12px; box-shadow:0 8px 24px rgba(0,0,0,0.4); }
  .question-label { font-size:0.65rem; color:rgba(245,240,232,0.4); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
  .question-text { font-family:'Fredoka One',cursive; font-size:1.05rem; color:var(--chalk); line-height:1.4; letter-spacing:0.3px; }
  .options-list { display:flex; flex-direction:column; gap:8px; width:100%; max-width:640px; margin-bottom:12px; }
  .opt-btn { background:rgba(255,255,255,0.06); border:2px solid rgba(255,255,255,0.12); border-radius:11px; padding:12px 14px; text-align:left; cursor:pointer; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.88rem; color:var(--chalk); transition:all 0.18s; display:flex; align-items:center; gap:10px; }
  .opt-btn:hover:not(:disabled) { border-color:var(--mint); background:rgba(91,200,168,0.08); }
  .opt-btn.correct { border-color:var(--mint); background:rgba(91,200,168,0.15); color:var(--mint); }
  .opt-btn.wrong { border-color:var(--coral); background:rgba(232,97,74,0.12); color:var(--coral); }
  .opt-btn:disabled { cursor:default; }
  .opt-letter { width:24px; height:24px; border-radius:50%; background:rgba(0,0,0,0.25); display:flex; align-items:center; justify-content:center; font-size:0.75rem; font-weight:800; flex-shrink:0; color:rgba(245,240,232,0.6); }
  .opt-btn.correct .opt-letter { background:var(--mint); color:#1e332a; }
  .opt-btn.wrong .opt-letter { background:var(--coral); color:white; }
  .feedback-box { width:100%; max-width:640px; border-radius:11px; padding:12px 14px; margin-bottom:12px; font-size:0.85rem; line-height:1.5; display:none; }
  .feedback-box.show { display:block; }
  .feedback-box.correct-fb { border:1px solid var(--mint); background:rgba(91,200,168,0.08); color:var(--mint); }
  .feedback-box.wrong-fb { border:1px solid var(--coral); background:rgba(232,97,74,0.06); color:var(--chalk); }
  .feedback-label { font-weight:800; margin-bottom:3px; }
  .next-action-btn { width:100%; max-width:640px; padding:13px; border-radius:12px; border:none; font-family:'Fredoka One',cursive; font-size:1rem; letter-spacing:1px; cursor:pointer; display:none; transition:all 0.2s; }
  .next-action-btn.show { display:block; }
  .next-action-btn:hover { opacity:0.88; }

  /* COMPLETE PANEL */
  .complete-panel { display:none; width:100%; max-width:640px; text-align:center; padding:20px; }
  .complete-panel.show { display:block; }
  .complete-icon { font-size:4rem; margin-bottom:10px; }
  .complete-title { font-family:'Fredoka One',cursive; font-size:1.5rem; color:var(--yellow); margin-bottom:6px; }
  .complete-score { color:rgba(245,240,232,0.6); font-size:0.9rem; margin-bottom:20px; }
  .complete-btns { display:flex; flex-direction:column; gap:8px; max-width:280px; margin:0 auto; }
  .complete-btns button { padding:12px; border-radius:11px; border:none; font-family:'Fredoka One',cursive; font-size:0.95rem; cursor:pointer; transition:opacity 0.2s; }
  .complete-btns button:hover { opacity:0.85; }

  /* QUIZ SCREEN */
  #quiz-screen { max-width:640px; }
  .quiz-title-bar { width:100%; display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .quiz-title-bar h2 { font-family:'Fredoka One',cursive; font-size:1.3rem; color:var(--yellow); }
  .quiz-score-pill { background:rgba(0,0,0,0.3); border-radius:20px; padding:5px 12px; font-size:0.8rem; font-weight:700; color:var(--chalk); }
  .quiz-progress-bar { width:100%; height:5px; background:rgba(0,0,0,0.3); border-radius:3px; overflow:hidden; margin-bottom:18px; }
  .quiz-progress-fill { height:100%; border-radius:3px; transition:width 0.4s; background:var(--yellow); }
  .quiz-type-tag { font-size:0.65rem; color:rgba(245,240,232,0.4); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; align-self:flex-start; }

  /* RESULTS SCREEN */
  #results-screen { max-width:500px; text-align:center; padding:30px 0; }
  .results-icon { font-size:5rem; margin-bottom:14px; }
  .results-title { font-family:'Fredoka One',cursive; font-size:2rem; color:var(--yellow); margin-bottom:6px; }
  .results-sub { color:rgba(245,240,232,0.55); font-size:0.9rem; margin-bottom:24px; line-height:1.6; }
  .score-display { font-family:'Fredoka One',cursive; font-size:3rem; color:var(--chalk); margin-bottom:4px; }
  .score-display span { color:var(--yellow); }
  .score-pct { font-size:1rem; color:rgba(245,240,232,0.5); margin-bottom:24px; }
  .results-btns { display:flex; flex-direction:column; gap:10px; width:100%; }
  .results-btns button { padding:13px; border-radius:12px; border:none; font-family:'Fredoka One',cursive; font-size:1rem; cursor:pointer; transition:opacity 0.2s; }
  .results-btns button:hover { opacity:0.85; }

  @media(max-width:400px) { .units-grid { grid-template-columns:1fr 1fr; } }
</style>
</head>
<body>

<!-- PASSWORD -->
<div id="pw-screen">
  <div class="pw-box">
    <div class="pw-icon">📝</div>
    <div class="pw-title">Grammar Practice</div>
    <p class="pw-sub">Enter your access code to continue</p>
    <div class="pw-label">Access Code</div>
    <input class="pw-input" type="password" id="pw-input" placeholder="••••••••" maxlength="20" autocomplete="off" />
    <button class="pw-btn" onclick="checkPW()">Enter →</button>
    <div class="pw-error" id="pw-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- HOME -->
  <div id="home-screen" class="screen active">
    <h1>📝 Grammar</h1>
    <p class="subtitle">Grade 1 · Wonders Curriculum</p>
    <div class="grade-badge">Grade 1</div>
    <div class="units-grid" id="units-grid"></div>
    <button class="overall-quiz-btn" onclick="startQuiz('overall')">⚡ Overall Quiz — All Units</button>
  </div>

  <!-- UNIT -->
  <div id="unit-screen" class="screen">
    <div style="width:100%;max-width:640px">
      <button class="back-btn" onclick="goHome()">← Back</button>
    </div>
    <div class="unit-header">
      <h2 id="unit-screen-title"></h2>
      <p id="unit-screen-sub"></p>
    </div>
    <div class="weeks-list" id="weeks-list"></div>
    <button class="unit-quiz-btn" id="unit-quiz-btn" onclick="startQuiz('unit')">📋 Unit Quiz</button>
  </div>

  <!-- PRACTICE -->
  <div id="practice-screen" class="screen">
    <div style="width:100%;max-width:640px">
      <button class="back-btn" onclick="goUnit()">← Back to Unit</button>
    </div>
    <div class="practice-header">
      <h2 id="practice-title"></h2>
      <p id="practice-sub"></p>
    </div>
    <div class="explain-card" id="explain-card"></div>
    <div class="progress-bar"><div class="progress-fill" id="practice-progress-fill"></div></div>
    <div class="q-counter" id="q-counter"></div>

    <div id="practice-wrap">
      <div class="question-card">
        <div class="question-label">Question</div>
        <div class="question-text" id="practice-q-text"></div>
      </div>
      <div class="options-list" id="practice-opts"></div>
      <div class="feedback-box" id="practice-feedback">
        <div class="feedback-label" id="practice-fb-label"></div>
        <div id="practice-fb-text"></div>
      </div>
      <button class="next-action-btn" id="practice-next-btn" onclick="practiceNext()"></button>
    </div>

    <div class="complete-panel" id="practice-complete">
      <div class="complete-icon" id="pc-icon"></div>
      <div class="complete-title" id="pc-title"></div>
      <div class="complete-score" id="pc-score"></div>
      <div class="complete-btns">
        <button id="week-quiz-btn" onclick="startQuiz('week')" style="background:var(--yellow);color:#2d2200">📋 Week Quiz</button>
        <button onclick="restartPractice()" style="background:rgba(255,255,255,0.1);color:var(--chalk)">↺ Try Again</button>
        <button onclick="goUnit()" style="background:rgba(255,255,255,0.06);color:rgba(245,240,232,0.6)">← Back to Unit</button>
      </div>
    </div>
  </div>

  <!-- QUIZ -->
  <div id="quiz-screen" class="screen">
    <div style="width:100%;max-width:640px">
      <button class="back-btn" id="quiz-back-btn">← Back</button>
    </div>
    <div class="quiz-title-bar">
      <h2 id="quiz-title-label"></h2>
      <div class="quiz-score-pill" id="quiz-score-pill">0 / 0</div>
    </div>
    <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="quiz-progress-fill"></div></div>
    <div class="quiz-type-tag" id="quiz-type-tag"></div>

    <div id="quiz-wrap">
      <div class="question-card">
        <div class="question-label">Question</div>
        <div class="question-text" id="quiz-q-text"></div>
      </div>
      <div class="options-list" id="quiz-opts"></div>
      <div class="feedback-box" id="quiz-feedback">
        <div class="feedback-label" id="quiz-fb-label"></div>
        <div id="quiz-fb-text"></div>
      </div>
      <button class="next-action-btn" id="quiz-next-btn" onclick="quizNext()"></button>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results-screen" class="screen">
    <div class="results-icon" id="results-icon"></div>
    <div class="results-title" id="results-title"></div>
    <div class="results-sub" id="results-sub"></div>
    <div class="score-display"><span id="results-score-num"></span> / <span id="results-score-total"></span></div>
    <div class="score-pct" id="results-pct"></div>
    <div class="results-btns">
      <button id="results-retry-btn" style="background:var(--yellow);color:#2d2200">↺ Try Again</button>
      <button id="results-back-btn" style="background:rgba(255,255,255,0.08);color:var(--chalk)">← Go Back</button>
    </div>
  </div>

</div><!-- /app -->

<script>
// ═══════════════════════════════════════════
// PASSWORD
// ═══════════════════════════════════════════
function checkPW() {
  const v = document.getElementById('pw-input').value;
  const inp = document.getElementById('pw-input');
  if (v === 'KSL2028') {
    document.getElementById('pw-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    renderHome();
  } else {
    document.getElementById('pw-error').textContent = 'Incorrect code. Please try again.';
    inp.classList.add('shake');
    inp.value = '';
    setTimeout(() => inp.classList.remove('shake'), 500);
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') checkPW(); });

// ═══════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════
const UNITS = [
  {
    id: 1, title: "Getting to Know Us", color: "#5bc8a8",
    weeks: [
      {
        topic: "Sentences",
        explanation: "A <strong>sentence</strong> is a group of words that tells a complete thought. Every sentence starts with a <strong>capital letter</strong> and ends with a <strong>punctuation mark</strong>.",
        questions: [
          { q: "Which of these is a sentence?", opts: ["The big dog.", "Runs very fast.", "The dog runs fast.", "Big and fast."], correct: 2, exp: "A sentence must tell a complete thought with a subject and a verb. 'The dog runs fast' is complete." },
          { q: "What does every sentence start with?", opts: ["A small letter", "A capital letter", "A number", "A punctuation mark"], correct: 1, exp: "Every sentence must begin with a capital letter." },
          { q: "Which of these is NOT a sentence?", opts: ["I like school.", "We play outside.", "The red ball.", "She can run."], correct: 2, exp: "'The red ball' is not a sentence because it has no verb — it doesn't tell what happened." },
          { q: "A sentence must...", opts: ["have only two words", "tell a complete thought", "start with a number", "end with a comma"], correct: 1, exp: "A sentence tells a complete thought. It needs a subject and a verb." },
          { q: "Which sentence is written correctly?", opts: ["the cat is soft.", "The cat is soft.", "The cat is soft", "the Cat is soft."], correct: 1, exp: "A sentence starts with a capital letter and ends with a punctuation mark." },
          { q: "How does every sentence end?", opts: ["With a capital letter", "With a number", "With a punctuation mark", "With a space"], correct: 2, exp: "Every sentence ends with a punctuation mark: a period, question mark, or exclamation mark." },
        ]
      },
      {
        topic: "Word Order",
        explanation: "Words in a sentence must be in the <strong>correct order</strong> to make sense. Changing the order of words can change the meaning or make a sentence confusing.",
        questions: [

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let currentUnit = 0; // index 0-5
let currentWeek = 0; // index 0-4
let practiceIdx = 0;
let practiceScore = 0;
let practiceAnswered = false;

let quizMode = ''; // 'week', 'unit', 'overall'
let quizQuestions = [];
let quizIdx = 0;
let quizScore = 0;
let quizAnswered = false;
let quizReturnTo = 'home'; // where to go back after quiz

// ═══════════════════════════════════════════
// SCREENS
// ═══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ═══════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════
function renderHome() {
  const grid = document.getElementById('units-grid');
  grid.innerHTML = '';
  UNITS.forEach((u, i) => {
    const card = document.createElement('div');
    card.className = 'unit-card';
    card.style.setProperty('--uc', u.color);
    card.innerHTML = `<div class="unit-num">Unit ${u.id}</div><div class="unit-title">${u.title}</div><div class="unit-sub">5 weeks · 30 questions</div>`;
    card.onclick = () => openUnit(i);
    grid.appendChild(card);
  });
  showScreen('home-screen');
}

function goHome() { renderHome(); }

// ═══════════════════════════════════════════
// UNIT
// ═══════════════════════════════════════════
function openUnit(uIdx) {
  currentUnit = uIdx;
  const u = UNITS[uIdx];
  document.getElementById('unit-screen-title').textContent = `Unit ${u.id}: ${u.title}`;
  document.getElementById('unit-screen-sub').textContent = 'Select a week to practise';

  const list = document.getElementById('weeks-list');
  list.innerHTML = '';
  u.weeks.forEach((w, wIdx) => {
    const btn = document.createElement('div');
    btn.className = 'week-btn';
    btn.style.setProperty('--wc', u.color);
    btn.innerHTML = `<span class="week-num-badge" style="--wc:${u.color}">Week ${wIdx + 1}</span><span class="week-topic">${w.topic}</span>`;
    btn.onclick = () => openPractice(uIdx, wIdx);
    list.appendChild(btn);
  });

  const uqBtn = document.getElementById('unit-quiz-btn');
  uqBtn.textContent = `📋 Unit ${u.id} Quiz — All 5 Weeks`;
  uqBtn.style.background = u.color;
  uqBtn.style.color = '#1e332a';

  showScreen('unit-screen');
}

function goUnit() { openUnit(currentUnit); }

// ═══════════════════════════════════════════
// PRACTICE
// ═══════════════════════════════════════════
function openPractice(uIdx, wIdx) {
  currentUnit = uIdx;
  currentWeek = wIdx;
  const u = UNITS[uIdx];
  const w = u.weeks[wIdx];

  document.getElementById('practice-title').textContent = w.topic;
  document.getElementById('practice-sub').textContent = `Unit ${u.id} · Week ${wIdx + 1}`;
  document.getElementById('explain-card').innerHTML = w.explanation;
  document.getElementById('explain-card').style.setProperty('--pc', u.color);
  document.getElementById('practice-progress-fill').style.background = u.color;

  practiceIdx = 0;
  practiceScore = 0;
  practiceAnswered = false;

  document.getElementById('practice-wrap').style.display = 'block';
  document.getElementById('practice-complete').className = 'complete-panel';

  renderPracticeQ();
  showScreen('practice-screen');
}

function renderPracticeQ() {
  const w = UNITS[currentUnit].weeks[currentWeek];
  const total = w.questions.length;

  if (practiceIdx >= total) {
    showPracticeComplete();
    return;
  }

  const pct = (practiceIdx / total) * 100;
  document.getElementById('practice-progress-fill').style.width = pct + '%';
  document.getElementById('q-counter').textContent = `QUESTION ${practiceIdx + 1} OF ${total}`;

  const q = w.questions[practiceIdx];
  document.getElementById('practice-q-text').textContent = q.q;
  practiceAnswered = false;

  const opts = document.getElementById('practice-opts');
  opts.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${'ABCD'[i]}</span>${opt}`;
    btn.onclick = () => selectPractice(i);
    opts.appendChild(btn);
  });

  const fb = document.getElementById('practice-feedback');
  fb.className = 'feedback-box';
  document.getElementById('practice-fb-label').textContent = '';
  document.getElementById('practice-fb-text').textContent = '';

  const nb = document.getElementById('practice-next-btn');
  nb.className = 'next-action-btn';
  const u = UNITS[currentUnit];
  nb.style.background = u.color;
  nb.style.color = '#1e332a';
  nb.textContent = practiceIdx < total - 1 ? 'Next →' : 'See Results →';
}

function selectPractice(idx) {
  if (practiceAnswered) return;
  practiceAnswered = true;
  const q = UNITS[currentUnit].weeks[currentWeek].questions[practiceIdx];
  const correct = idx === q.correct;
  if (correct) practiceScore++;

  document.querySelectorAll('#practice-opts .opt-btn').forEach((b, i) => {
    b.disabled = true;
    if (i === q.correct) b.classList.add('correct');
    else if (i === idx && !correct) b.classList.add('wrong');
  });

  const fb = document.getElementById('practice-feedback');
  fb.className = 'feedback-box show ' + (correct ? 'correct-fb' : 'wrong-fb');
  document.getElementById('practice-fb-label').textContent = correct ? '✓ Correct!' : '✗ Not quite.';
  document.getElementById('practice-fb-text').textContent = q.exp;
  document.getElementById('practice-next-btn').className = 'next-action-btn show';
}

function practiceNext() {
  practiceIdx++;
  renderPracticeQ();
}

function showPracticeComplete() {
  document.getElementById('practice-wrap').style.display = 'none';
  document.getElementById('practice-complete').className = 'complete-panel show';
  document.getElementById('practice-progress-fill').style.width = '100%';

  const total = UNITS[currentUnit].weeks[currentWeek].questions.length;
  const pct = Math.round((practiceScore / total) * 100);
  document.getElementById('pc-icon').textContent = pct >= 80 ? '🏆' : pct >= 60 ? '✅' : '📚';
  document.getElementById('pc-title').textContent = pct >= 80 ? 'Excellent!' : pct >= 60 ? 'Good work!' : 'Keep practising!';
  document.getElementById('pc-score').textContent = `${practiceScore} out of ${total} (${pct}%)`;
}

function restartPractice() { openPractice(currentUnit, currentWeek); }

// ═══════════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════════
function startQuiz(mode) {
  quizMode = mode;
  quizQuestions = [];

  if (mode === 'week') {
    quizReturnTo = 'practice';
    const qs = UNITS[currentUnit].weeks[currentWeek].questions;
    quizQuestions = shuffle([...qs]).slice(0, 5);
    document.getElementById('quiz-title-label').textContent = `Week Quiz: ${UNITS[currentUnit].weeks[currentWeek].topic}`;
    document.getElementById('quiz-type-tag').textContent = `UNIT ${currentUnit + 1} · WEEK ${currentWeek + 1}`;
    document.getElementById('quiz-back-btn').onclick = () => { openPractice(currentUnit, currentWeek); };

  } else if (mode === 'unit') {
    quizReturnTo = 'unit';
    const u = UNITS[currentUnit];
    u.weeks.forEach(w => {
      const picked = shuffle([...w.questions]).slice(0, 2);
      quizQuestions.push(...picked);
    });
    quizQuestions = shuffle(quizQuestions);
    document.getElementById('quiz-title-label').textContent = `Unit ${u.id} Quiz`;
    document.getElementById('quiz-type-tag').textContent = `UNIT ${currentUnit + 1} — ALL 5 WEEKS`;
    document.getElementById('quiz-back-btn').onclick = () => { openUnit(currentUnit); };

  } else { // overall
    quizReturnTo = 'home';
    UNITS.forEach(u => {
      u.weeks.forEach(w => {
        const picked = shuffle([...w.questions]).slice(0, 1);
        quizQuestions.push(...picked);
      });
    });
    quizQuestions = shuffle(quizQuestions).slice(0, 20);
    document.getElementById('quiz-title-label').textContent = '⚡ Overall Quiz';
    document.getElementById('quiz-type-tag').textContent = 'ALL UNITS — GRADE 1';
    document.getElementById('quiz-back-btn').onclick = () => { goHome(); };
  }

  quizIdx = 0;
  quizScore = 0;
  quizAnswered = false;
  renderQuizQ();
  showScreen('quiz-screen');
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function renderQuizQ() {
  if (quizIdx >= quizQuestions.length) { showResults(); return; }

  const total = quizQuestions.length;
  document.getElementById('quiz-progress-fill').style.width = `${(quizIdx / total) * 100}%`;
  document.getElementById('quiz-score-pill').textContent = `${quizScore} / ${quizIdx}`;

  const q = quizQuestions[quizIdx];
  document.getElementById('quiz-q-text').textContent = q.q;
  quizAnswered = false;

  const opts = document.getElementById('quiz-opts');
  opts.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-letter">${'ABCD'[i]}</span>${opt}`;
    btn.onclick = () => selectQuiz(i);
    opts.appendChild(btn);
  });

  const fb = document.getElementById('quiz-feedback');
  fb.className = 'feedback-box';
  document.getElementById('quiz-fb-label').textContent = '';
  document.getElementById('quiz-fb-text').textContent = '';

  const nb = document.getElementById('quiz-next-btn');
  nb.className = 'next-action-btn';
  nb.style.background = 'var(--yellow)';
  nb.style.color = '#2d2200';
  nb.textContent = quizIdx < total - 1 ? 'Next →' : 'See Results →';
}

function selectQuiz(idx) {
  if (quizAnswered) return;
  quizAnswered = true;
  const q = quizQuestions[quizIdx];
  const correct = idx === q.correct;
  if (correct) quizScore++;

  document.querySelectorAll('#quiz-opts .opt-btn').forEach((b, i) => {
    b.disabled = true;
    if (i === q.correct) b.classList.add('correct');
    else if (i === idx && !correct) b.classList.add('wrong');
  });

  const fb = document.getElementById('quiz-feedback');
  fb.className = 'feedback-box show ' + (correct ? 'correct-fb' : 'wrong-fb');
  document.getElementById('quiz-fb-label').textContent = correct ? '✓ Correct!' : '✗ Not quite.';
  document.getElementById('quiz-fb-text').textContent = q.exp;
  document.getElementById('quiz-next-btn').className = 'next-action-btn show';
}

function quizNext() {
  quizIdx++;
  renderQuizQ();
}

// ═══════════════════════════════════════════
// RESULTS
// ═══════════════════════════════════════════
function showResults() {
  const total = quizQuestions.length;
  const pct = Math.round((quizScore / total) * 100);

  document.getElementById('results-icon').textContent = pct >= 80 ? '🏆' : pct >= 60 ? '⭐' : '📚';
  document.getElementById('results-title').textContent = pct >= 80 ? 'Outstanding!' : pct >= 60 ? 'Good work!' : 'Keep going!';
  document.getElementById('results-sub').textContent = pct >= 80 ? 'You have a great grasp of this grammar!' : pct >= 60 ? 'Review the questions you found tricky and try again.' : 'Go back to the lessons and practise more.';
  document.getElementById('results-score-num').textContent = quizScore;
  document.getElementById('results-score-total').textContent = total;
  document.getElementById('results-pct').textContent = pct + '%';

  document.getElementById('results-retry-btn').onclick = () => startQuiz(quizMode);
  document.getElementById('results-back-btn').onclick = () => {
    if (quizReturnTo === 'unit') openUnit(currentUnit);
    else if (quizReturnTo === 'practice') openPractice(currentUnit, currentWeek);
    else goHome();
  };

  showScreen('results-screen');
}

// INIT
renderHome();
</script>
</body>
</html>
